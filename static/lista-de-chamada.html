<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Chamada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f8f4ea;
    --paper-deep:#f1ebdd;
    --line:#dcd2b8;
    --ink:#242119;
    --ink-soft:#6b6353;
    --pine:#2f5d50;
    --pine-soft:#e4ece8;
    --rust:#8c3a2b;
    --rust-soft:#f3e4de;
    --gold:#a9822f;
    --gold-soft:#f1e6c9;
    --shadow: 0 1px 2px rgba(36,33,25,0.06), 0 8px 24px -12px rgba(36,33,25,0.18);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 500px at 20% -10%, #fffdf6 0%, transparent 60%),
      var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100dvh;
    padding: 48px 20px 80px;
  }

  .wrap{
    max-width: 880px;
    margin: 0 auto;
  }

  /* ===== Header / ledger cover ===== */
  header{
    position:relative;
    padding: 40px 44px 32px;
    background: var(--paper-deep);
    border: 1px solid var(--line);
    border-radius: 4px;
    box-shadow: var(--shadow);
    margin-bottom: 28px;
    overflow:hidden;
  }
  header::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width: 10px;
    background: repeating-linear-gradient(
      180deg,
      var(--gold) 0 6px,
      transparent 6px 14px
    );
    opacity:.55;
  }
  .top-line{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 10px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0;
  }
  .grupo-badge{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing:.08em;
    color: var(--pine);
    background: var(--pine-soft);
    border: 1px solid #c7d8cf;
    padding: 4px 10px;
    border-radius: 3px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: clamp(32px, 5vw, 46px);
    line-height: 1.05;
    margin: 0 0 8px;
    color: var(--ink);
  }
  .sub{
    font-size: 14.5px;
    color: var(--ink-soft);
    max-width: 52ch;
    line-height: 1.55;
    margin: 0 0 26px;
  }

  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap: 14px;
    align-items:flex-end;
    padding-top: 20px;
    border-top: 1px dashed var(--line);
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .field label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color: var(--ink-soft);
  }
  .field input[type=text], .field input[type=date]{
    font-family:'Inter', sans-serif;
    font-size: 14px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: #fffdf7;
    color: var(--ink);
    min-width: 190px;
  }
  .field input:focus{ outline: 2px solid var(--gold); outline-offset:1px; }

  .stats{
    display:flex;
    gap: 10px;
    margin-left:auto;
  }
  .stat{
    font-family:'IBM Plex Mono', monospace;
    text-align:center;
    padding: 8px 14px;
    border-radius: 3px;
    min-width: 78px;
    border:1px solid var(--line);
    background:#fffdf7;
  }
  .stat .n{ display:block; font-size:20px; font-weight:600; }
  .stat .l{ display:block; font-size: 9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin-top:2px;}
  .stat.present .n{ color: var(--pine); }
  .stat.absent .n{ color: var(--rust); }

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-bottom: 18px;
  }
  .search{
    flex:1;
    min-width: 200px;
    position:relative;
  }
  .search input{
    width:100%;
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding: 10px 14px 10px 34px;
    border:1px solid var(--line);
    border-radius: 4px;
    background:#fffdf7;
    color:var(--ink);
  }
  .search input:focus{ outline:2px solid var(--gold); outline-offset:1px; }
  .search svg{
    position:absolute; left:11px; top:50%; transform:translateY(-50%);
    width:14px; height:14px; opacity:.5;
  }
  .btn{
    font-family:'Inter', sans-serif;
    font-size: 13px;
    font-weight:600;
    padding: 10px 16px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: #fffdf7;
    color: var(--ink);
    cursor:pointer;
    transition: all .15s ease;
    white-space:nowrap;
  }
  .btn:hover{ border-color: var(--ink-soft); }
  .btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .btn.primary{
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .btn.primary:hover{ background:#3a352a; }
  .btn.ghost{ background:transparent; }

  /* ===== List ===== */
  .list{
    border:1px solid var(--line);
    border-radius:4px;
    overflow:hidden;
    background: #fffdf8;
    box-shadow: var(--shadow);
  }

  .row{
    display:grid;
    grid-template-columns: 46px 1fr auto;
    align-items:center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom:1px solid var(--line);
    transition: background .2s ease;
  }
  .row:last-child{ border-bottom:none; }
  .row.is-absent{ background: var(--rust-soft); }
  .row.is-present{ background: transparent; }

  .idx{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    text-align:right;
  }

  .name{
    font-family:'Fraunces', serif;
    font-size: 16.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--ink);
  }
  .row.is-absent .name{ color:#5c3226; }

  /* stamp toggle */
  .stamp-toggle{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    user-select:none;
  }
  .stamp-toggle input{
    position:absolute;
    opacity:0;
    width:34px; height:34px;
    margin:0;
    cursor:pointer;
  }
  .stamp{
    width:34px; height:34px;
    border-radius:50%;
    border: 2px solid var(--pine);
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--pine);
    background: var(--pine-soft);
    transition: all .18s ease;
    flex-shrink:0;
  }
  .stamp svg{ width:16px; height:16px; opacity:1; transition: transform .18s ease;}
  .stamp-toggle input:not(:checked) + .stamp{
    border-color: var(--rust);
    color: var(--rust);
    background: var(--rust-soft);
  }
  .stamp-toggle input:not(:checked) + .stamp svg{ transform: rotate(90deg) scale(0); }
  .stamp-toggle input:checked + .stamp svg{ transform: rotate(0) scale(1); }
  .stamp-toggle input:focus-visible + .stamp{ outline:2px solid var(--gold); outline-offset:2px; }

  .status-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    width: 74px;
  }
  .row.is-present .status-label{ color: var(--pine); }
  .row.is-absent .status-label{ color: var(--rust); }

  .toggle-cell{ display:flex; align-items:center; gap:12px; }

  /* reason panel */
  .reason-panel{
    grid-column: 1 / -1;
    display:none;
    padding: 14px 16px 16px 60px;
    margin-top: 4px;
    border-top: 1px dashed var(--line);
  }
  .row.is-absent .reason-panel{ display:block; }

  .reason-title{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color: var(--rust);
    margin-bottom: 10px;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap: 8px;
  }
  .opt{
    display:flex;
    align-items:center;
    gap: 9px;
    font-size: 13.5px;
    color: var(--ink);
  }
  .opt input[type=radio]{
    width:15px; height:15px;
    accent-color: var(--rust);
  }
  .group-input{
    margin-left: 24px;
    margin-top: 6px;
    display:none;
  }
  .group-input.show{ display:block; }
  .group-input input{
    font-family:'Inter', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    border:1px solid var(--line);
    border-radius:3px;
    width: 260px;
    max-width:100%;
    background:#fffdf7;
  }
  .group-input input:focus{ outline:2px solid var(--gold); outline-offset:1px;}

  .empty{
    padding: 40px 20px;
    text-align:center;
    color: var(--ink-soft);
    font-size: 14px;
    display:none;
  }

  .state-msg{
    padding: 60px 20px;
    text-align:center;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .state-msg a{ color: var(--ink); font-weight:600; }

  footer{
    margin-top: 26px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap: 12px;
  }
  .footnote{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .footer-actions{ display:flex; gap:10px; }

  #toast{
    position:fixed;
    bottom: 24px;
    left:50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 4px;
    opacity:0;
    pointer-events:none;
    transition: all .25s ease;
  }
  #toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 620px){
    header{ padding: 28px 22px 24px; }
    .row{ grid-template-columns: 30px 1fr auto; padding: 12px 14px; gap:10px;}
    .name{ font-size:15px; }
    .status-label{ display:none; }
    .reason-panel{ padding-left: 16px; }
    .stats{ margin-left:0; width:100%; }
    .stat{ flex:1; }
  }

  @media print{
    body{ padding:0; background:#fff; }
    .toolbar, footer, .search{ display:none !important; }
    header{ box-shadow:none; }
    .list{ box-shadow:none; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="top-line">
      <p class="eyebrow">Registro de presença</p>
      <span class="grupo-badge" id="grupo-badge"></span>
    </div>
    <h1>Lista de Chamada</h1>
    <p class="sub">Confirme a presença de cada membro. Ao desmarcar um nome como ausente, informe o motivo correspondente.</p>

    <div class="meta-row">
      <div class="field">
        <label for="data-chamada">Data</label>
        <input type="date" id="data-chamada">
      </div>
      <div class="field">
        <label for="responsavel">Responsável</label>
        <input type="text" id="responsavel" placeholder="Nome de quem faz a chamada">
      </div>
      <div class="stats">
        <div class="stat present">
          <span class="n" id="count-present">0</span>
          <span class="l">Presentes</span>
        </div>
        <div class="stat absent">
          <span class="n" id="count-absent">0</span>
          <span class="l">Ausentes</span>
        </div>
        <div class="stat total">
          <span class="n" id="count-total">0</span>
          <span class="l">Total</span>
        </div>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Buscar nome…">
    </div>
    <button class="btn" id="mark-all-present">Marcar todos presentes</button>
    <button class="btn ghost" id="reset-all">Reiniciar</button>
    <button class="btn ghost" id="logout">Trocar de conta</button>
  </div>

  <div class="list" id="list"></div>
  <p class="empty" id="empty-msg">Nenhum nome encontrado.</p>
  <div class="state-msg" id="state-msg" style="display:none;"></div>

  <footer>
    <p class="footnote" id="footnote">Toque no círculo para alternar presença.</p>
    <div class="footer-actions">
      <button class="btn" id="btn-print">Imprimir</button>
      <button class="btn primary" id="btn-copy">Copiar resumo</button>
    </div>
  </footer>

</div>

<div id="toast"></div>

<script src="chamada.js" defer></script>
</body>
</html>
